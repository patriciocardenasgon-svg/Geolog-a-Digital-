<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Blog Profesional</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .blog-post { 
            max-width: 700px; 
            margin: auto; 
            background: white; 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        .post-image { 
            width: 100%; 
            height: 350px; 
            object-fit: cover; /* Esto evita que la imagen se estire feo */
        }
        .content { padding: 30px; }
        h1 { color: #2c3e50; margin-top: 0; }
        .badge { 
            background: #3498db; 
            color: white; 
            padding: 5px 12px; 
            border-radius: 20px; 
            font-size: 0.8em; 
            font-weight: bold; 
        }
    </style>
</head>
<body>

    <div class="blog-post">
        <!-- Imagen Directa desde un servidor externo -->
        <img src="https://images.unsplash.com/photo-1504198266304-482186a60f4c?auto=format&fit=crop&w=800&q=80" 
             alt="Estratos Geológicos" 
             class="post-image">
        
        <div class="content">
            <span class="badge">GEOLOGÍA DIGITAL</span>
            <h1>Análisis de Suelos y Modelado</h1>
            <p>Bienvenido a mi bitácora. Aquí encontrarás mis trabajos sobre geociencias y los recursos educativos que desarrollo para secundaria.</p>
            
            <hr>
            <p style="color: #7f8c8d; font-style: italic;">
                Dato técnico: Esta imagen se carga directamente mediante un enlace "URL".
            </p>
        </div>
    </div>

</body>
</html>
